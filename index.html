<div class="dashboard-cards" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
    <div class="card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-left: 5px solid var(--primary);">
        <span style="color: #64748B; font-size: 12px; font-weight: bold; text-transform: uppercase;">Valor Total em Estoque</span>
        <h2 id="valor-total" style="color: var(--text-dark); margin-top: 5px;">R$ 0,00</h2>
    </div>
    <div class="card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-left: 5px solid var(--warning);">
        <span style="color: #64748B; font-size: 12px; font-weight: bold; text-transform: uppercase;">Itens em Risco (Abaixo do Mínimo)</span>
        <h2 id="itens-risco" style="color: var(--warning); margin-top: 5px;">0</h2>
    </div>
    <div class="card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border-left: 5px solid var(--danger);">
        <span style="color: #64748B; font-size: 12px; font-weight: bold; text-transform: uppercase;">Validade Próxima (30 dias)</span>
        <h2 style="color: var(--danger); margin-top: 5px;">3 itens</h2>
    </div>
</div>
